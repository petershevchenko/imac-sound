PACKAGE_NAME="snd-hda-codec-cs8409-imac"
PACKAGE_VERSION="1.12"

# Build just the single Cirrus CS8409 codec module out-of-tree. Private HDA
# headers are bundled under common/ and codecs/, so the only build dependency
# is the matching linux-headers package.
MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

BUILT_MODULE_NAME[0]="snd-hda-codec-cs8409"
BUILT_MODULE_LOCATION[0]="."
# Install into updates/dkms so this module overrides the in-tree
# kernel/sound/hda/codecs/cirrus/snd-hda-codec-cs8409.ko.
DEST_MODULE_LOCATION[0]="/updates/dkms"

AUTOINSTALL="yes"
